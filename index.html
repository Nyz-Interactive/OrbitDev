<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrbitDev - Missão Espacial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0f;
      font-family: 'Comic Sans MS', 'Chalkboard SE', Arial, sans-serif;
      color: #e0e0ff;
      background-image: 
        radial-gradient(1px 1px at 25px 5px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 25px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 125px 20px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 75px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 15px 125px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: estrelas 100s linear infinite;
      min-height: 100vh;
      padding: 20px;
    }

    @keyframes estrelas {
      from { background-position: 0 0; }
      to { background-position: -400px -400px; }
    }

   .container { max-width: 800px; margin: 0 auto; }
    
    h1 {
      text-align: center;
      font-size: 3.5rem;
      background: linear-gradient(90deg, #6e44ff, #b892ff, #44d1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      font-weight: 800;
    }
    
   .subtitulo {

      color: #a0a0ff; 
      margin-bottom: 30px;

    }
    
    #busca {

      padding: 15px 20px;
      font-size: 1.1rem;

      border-radius: 50px;
      background: rgba(20, 20, 40, 0.7);
      color: white;
      margin-bottom: 30px;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }

      background: rgba(20, 20, 40, 0.7);
      border: 1px solid rgba(110, 68, 255, 0.5);
      border-radius: 16px;
      padding: 25px;
      margin: 20px 0;
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }
    
   .vaga:hover {
      transform: translateY(-8px);
      border: 1px solid #6e44ff;
      box-shadow: 0 15px 40px rgba(110, 68, 255, 0.4);
    }
    
   .vaga h2 { 
      margin: 0 0 10px 0; 
      color: #fff; 
      font-size: 1.6rem;
    }
   .vaga p { margin: 8px 0; color: #b892ff; font-size: 1.1rem; }
   .tags { margin: 15px 0; }

      border-radius: 20px;
      font-size: 0.9rem;
      margin-right: 8px;
      display: inline-block;
      border: 1px solid #6e44ff;
    }
